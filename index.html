<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin Me</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #ffd1dc, #ffe6f0);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      color: #7a2954;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-top: 0;
      margin-bottom: 24px;
    }

    .wheel-wrap {
      position: relative;
      width: 320px;
      height: 320px;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 28px solid #d63384;
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 8px solid #d63384;
      position: relative;
      transition: transform 4s ease-out;
      background: conic-gradient(
        #ffb6c1 0deg 72deg,
        #ff85a2 72deg 144deg,
        #ff69b4 144deg 216deg,
        #ff4d94 216deg 288deg,
        #ffd1dc 288deg 360deg
      );
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .center-circle {
      position: absolute;
      width: 70px;
      height: 70px;
      background: white;
      border: 5px solid #d63384;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 26px;
    }

    button {
      margin-top: 28px;
      padding: 12px 28px;
      border: none;
      border-radius: 999px;
      background: #d63384;
      color: white;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(214, 51, 132, 0.25);
    }

    button:hover {
      opacity: 0.95;
    }

    #result {
      margin-top: 24px;
      font-size: 24px;
      font-weight: bold;
      max-width: 650px;
      min-height: 40px;
    }
  </style>
</head>
<body>
  <h1>Spin Me🎀</h1>
  <p>Click the button for a sweet message</p>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="wheel" id="wheel"></div>
    <div class="center-circle">💖</div>
  </div>

  <button onclick="spinWheel()">Spin</button>

  <div id="result">A little kindness is waiting for you ✨</div>

  <script>
    const messages = [
      "Have a beautiful day!",
      "You are amazing!",
      "Thank you for all that you do!",
      "You deserve good things!",
      "Keep shining!!"
    ];

    const wheel = document.getElementById("wheel");
    const result = document.getElementById("result");

    let currentRotation = 0;
    let spinning = false;

    function spinWheel() {
      if (spinning) return;
      spinning = true;

      const selectedIndex = Math.floor(Math.random() * messages.length);
      const segmentAngle = 360 / messages.length;

      const extraSpins = 5 * 360;
      const targetAngle = 360 - (selectedIndex * segmentAngle) - (segmentAngle / 2);
      const finalRotation = extraSpins + targetAngle;

      currentRotation += finalRotation;
      wheel.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        result.textContent = messages[selectedIndex];
        spinning = false;
      }, 4000);
    }
  </script>
</body>
</html>
